apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-web
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-web
    spec:
      tolerations:
        - key: kubernetes.io/arch
          operator: Equal
          value: amd64
          effect: NoSchedule
      containers:
        - name: web
          image: us-central1-docker.pkg.dev/learneroid/openclaw/openclaw-web:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-web
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw-web
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: openclaw-web
