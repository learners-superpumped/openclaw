gzip on;
gzip_static on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/wasm
    image/svg+xml
    application/manifest+json;

# Rate limiting (IP 기반)
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ===== 보안 헤더 =====
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    # CSP: Report-Only 모드 — 차단하지 않고 위반 로그만 브라우저 콘솔에 표시
    # 안정화 후 Content-Security-Policy 로 변경하여 enforce
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss://api.openclaw.zazz.buzz https://api.openclaw.zazz.buzz https://accounts.google.com; frame-src https://accounts.google.com; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ===== Rate Limiting =====
    limit_req zone=general burst=30 nodelay;

    # ===== 스캐너/프로브 경로 차단 =====
    location ~* ^/(wordpress|wp-admin|wp-login|wp-content|wp-includes|xmlrpc|remote|admin|shell|cmd|cgi-bin|migadmin|phpinfo|phpmyadmin)(/|$) {
        return 404;
        access_log off;
    }

    # 숨김 파일/디렉토리 차단 (.git/, .env, .htaccess 등)
    location ~ /\. {
        return 404;
        access_log off;
    }

    # 위험 확장자 차단 (이중 확장자 .php.old 등 포함)
    location ~* \.(php|asp|aspx|jsp|py|rb|pl|cgi|exe|bat|sh|cmd|sql|bak) {
        return 404;
        access_log off;
    }

    # ===== robots.txt (실제 파일 또는 404) =====
    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        access_log off;
    }

    # ===== Health check =====
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ===== Flutter 핵심 파일 (ETag 기반 revalidation) =====
    location ~* ^/(index\.html|main\.dart\.js|flutter\.js|flutter_service_worker\.js|flutter_bootstrap\.js|version\.json|manifest\.json)$ {
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ===== 정적 에셋 (immutable 캐시) =====
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webmanifest|map)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
        access_log off;
    }

    # ===== SPA 라우팅 fallback =====
    location / {
        try_files $uri $uri/ /index.html;
    }
}
