gzip on;
gzip_static on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/wasm
    image/svg+xml
    application/manifest+json;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # index.html, service worker: never cache
    location ~* ^/(index\.html|flutter_service_worker\.js|version\.json)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Hashed static assets: cache immutable
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot|webmanifest)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
        access_log off;
    }

    # SPA routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
