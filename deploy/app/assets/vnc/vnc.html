<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VNC Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0A0A; }
    #screen { width: 100%; height: 100%; }
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: #9E9E9E; font-family: -apple-system, sans-serif;
      font-size: 14px;
    }
    #status.hidden { display: none; }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <div id="screen"></div>

  <!-- noVNC bundle injected by Flutter at runtime -->
  <script>/* NOVNC_BUNDLE */</script>

  <script>
    var RFB = noVNC.default;
    var rfb = null;

    function reportStatus(data) {
      var json = JSON.stringify(data);
      if (window.VncStatus) {
        window.VncStatus.postMessage(json);
      }
      if (window.parent !== window) {
        window.parent.postMessage(json, '*');
      }
    }

    window.connectVnc = function(wsUrl, jwtToken) {
      var statusEl = document.getElementById('status');
      var screenEl = document.getElementById('screen');

      if (rfb) {
        try { rfb.disconnect(); } catch(_) {}
        rfb = null;
        while (screenEl.firstChild) screenEl.removeChild(screenEl.firstChild);
      }

      try {
        statusEl.textContent = 'Authenticating...';
        statusEl.classList.remove('hidden');

        var OrigWebSocket = window.WebSocket;

        window.WebSocket = function(url, protocols) {
          var ws = new OrigWebSocket(url, protocols);
          var authCompleted = false;
          var capturedOpenListeners = [];
          var origAdd = ws.addEventListener.bind(ws);
          var origRemove = ws.removeEventListener.bind(ws);

          ws.addEventListener = function(type, fn, opts) {
            if (!authCompleted && type === 'open') {
              capturedOpenListeners.push({ fn: fn, opts: opts });
              return;
            }
            origAdd(type, fn, opts);
          };

          ws.removeEventListener = function(type, fn, opts) {
            if (!authCompleted && type === 'open') {
              var idx = capturedOpenListeners.findIndex(function(e) { return e.fn === fn; });
              if (idx !== -1) capturedOpenListeners.splice(idx, 1);
              return;
            }
            origRemove(type, fn, opts);
          };

          function authMessageHandler(event) {
            if (authCompleted) return;
            try {
              var data = JSON.parse(event.data);
              if (data.type === 'auth_required') {
                ws.send(JSON.stringify({ type: 'auth', token: jwtToken }));
                event.stopImmediatePropagation();
                return;
              }
              if (data.type === 'auth_ok') {
                authCompleted = true;
                event.stopImmediatePropagation();
                origRemove('message', authMessageHandler);
                ws.addEventListener = origAdd;
                ws.removeEventListener = origRemove;
                for (var i = 0; i < capturedOpenListeners.length; i++) {
                  try { capturedOpenListeners[i].fn(new Event('open')); } catch(e) { console.error(e); }
                }
                return;
              }
              if (data.type === 'auth_error') {
                event.stopImmediatePropagation();
                ws.close();
                reportStatus({ type: 'error', message: data.message || 'Auth failed' });
                return;
              }
            } catch(e) {}
          }

          origAdd('message', authMessageHandler);
          return ws;
        };
        window.WebSocket.CONNECTING = OrigWebSocket.CONNECTING;
        window.WebSocket.OPEN = OrigWebSocket.OPEN;
        window.WebSocket.CLOSING = OrigWebSocket.CLOSING;
        window.WebSocket.CLOSED = OrigWebSocket.CLOSED;
        window.WebSocket.prototype = OrigWebSocket.prototype;

        rfb = new RFB(screenEl, wsUrl, { wsProtocols: [] });
        window.WebSocket = OrigWebSocket;

        rfb.scaleViewport = true;
        rfb.resizeSession = false;
        rfb.showDotCursor = true;
        rfb.qualityLevel = 6;
        rfb.compressionLevel = 2;

        rfb.addEventListener('connect', function() {
          statusEl.classList.add('hidden');
          reportStatus({ type: 'connected' });
        });
        rfb.addEventListener('disconnect', function(e) {
          statusEl.textContent = 'Disconnected';
          statusEl.classList.remove('hidden');
          reportStatus({ type: 'disconnected', clean: e.detail.clean });
        });
        rfb.addEventListener('credentialsrequired', function() {
          reportStatus({ type: 'error', message: 'VNC credentials required' });
        });

      } catch (e) {
        statusEl.textContent = 'Error: ' + e.message;
        statusEl.classList.remove('hidden');
        reportStatus({ type: 'error', message: e.message });
      }
    };

    window.disconnectVnc = function() {
      if (rfb) { rfb.disconnect(); rfb = null; }
    };

    // Auto-connect from URL hash (for web iframe)
    var hash = window.location.hash.substring(1);
    if (hash) {
      var params = new URLSearchParams(hash);
      var wsUrl = params.get('wsUrl');
      var token = params.get('token');
      if (wsUrl && token) {
        window.connectVnc(wsUrl, token);
      }
    }

    window.vncReady = true;
  </script>
</body>
</html>
